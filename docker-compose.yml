---
services:
  postgres:
    image: postgres:14-alpine3.20
    container_name: postgres
    restart: unless-stopped
    volumes:
      - ./data/postgres/14/database_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=greenlight

  redis:
    image: redis:6.2-alpine3.20
    container_name: greenlight-redis
    restart: unless-stopped
    volumes:
      - ./data/redis/database_data:/data

  greenlight-v3:
    build:
      context: .
      dockerfile: Dockerfile.custom
    image: greenlight-custom:v3
    container_name: greenlight-v3
    restart: unless-stopped
    env_file: .env
    environment:
      - FORCE_SSL=false
      - RAILS_ENV=development
      - RAILS_HOSTS=.
    ports:
      - "5050:3000"
    logging:
      driver: json-file
    volumes:
      - ./data/greenlight-v3/storage:/usr/src/app/storage
    depends_on:
      - postgres
      - redis
    entrypoint: >
      sh -c "sed -i 's/config.force_ssl = true/config.force_ssl = false/'
      /usr/src/app/config/environments/production.rb && bin/start"